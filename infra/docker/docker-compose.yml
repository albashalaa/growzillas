services:
  postgres:
    image: postgres:16
    container_name: growzillas_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: growzillas
    ports:
      - "5432:5432"
    volumes:
      - growzillas_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: growzillas_redis
    ports:
      - "6379:6379"

volumes:
  growzillas_pgdata:
